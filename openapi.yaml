openapi: 3.0.0
info:
  title: Tecda Maniquí API
  version: 2.1.0
  description: Gestión integral con soporte para Borrado Lógico, Facturación Electrónica y SP de Ensamblaje.
servers:
  - url: http://localhost:8081
    description: Servidor de Desarrollo

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      security: []
      responses:
        '200': { description: OK }
        '401': { description: Credenciales inválidas }

  /maniquies:
    get:
      summary: Listar maniquíes
      tags: [Producción]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: ['En Producción', 'Disponible', 'Vendido', 'Dañado'] }
      responses:
        '200': { description: OK }
    post:
      summary: Ensamblar maniquí (vía SP EnsamblarManiqui)
      tags: [Producción]
      responses:
        '201': { description: Creado }
        '400': { description: Error de stock o modelo }

  /clientes:
    get:
      summary: Listar clientes activos
      tags: [Comercial]
      parameters:
        - name: activo
          in: query
          schema: { type: boolean, default: true }
      responses:
        '200': { description: OK }

  /ventas:
    post:
      summary: Registrar venta con facturación
      tags: [Comercial]
      responses:
        '201': { description: Venta y Factura generada }

  /reportes/rentabilidad:
    get:
      summary: Vista de rentabilidad (Vistas SQL)
      tags: [Analítica]
      responses:
        '200': { description: OK }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  
  schemas:
    Modelo:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        activo: { type: boolean }

    Cliente:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        cuit_cuil: { type: string }
        activo: { type: boolean }

    Venta:
      type: object
      properties:
        id: { type: integer }
        total: { type: number }
        nro_factura: { type: string }
        cae: { type: string }
        moneda: { type: string, enum: ['ARS', 'USD'] }
