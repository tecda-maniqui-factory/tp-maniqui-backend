openapi: 3.0.0
info:
  title: Tecda Maniquí API
  version: 3.1.0
  description: |
    Gestión integral de fábrica de maniquíes con arquitectura SOLID (TypeScript).
    
    ### Cambios Recientes:
    * **Validación de Stock Técnica:** El ensamblaje ahora verifica la existencia de las 6 piezas (Cabeza, Torso, Brazos y Piernas).
    * **Captura de Errores SQL:** Errores del procedimiento almacenado se devuelven con descripción clara.
servers:
  - url: http://localhost:8081
    description: Servidor de Desarrollo

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email]
              properties:
                username: { type: string, minLength: 4 }
                password: { type: string, minLength: 6 }
                nombre_completo: { type: string }
                email: { type: string, format: email }
                rol: { type: string, enum: [vendedor, gerente_prod] }
      responses:
        '201':
          description: Usuario creado exitosamente
        '400':
          description: Error de validación o usuario duplicado

  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: JWT generado exitosamente
        '401':
          description: Credenciales inválidas

  /maniquies:
    get:
      summary: Listar maniquíes
      tags: [Producción]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: ['En Producción', 'Disponible', 'Vendido', 'Dañado'] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Maniqui' }

  /maniquies/{serie}:
    get:
      summary: Obtener maniquí por serie
      tags: [Producción]
      parameters:
        - name: serie
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }

  /maniquies/ensamblar:
    post:
      summary: Ejecutar ensamblaje técnico
      description: |
        Registra el ensamblaje de un nuevo maniquí. 
        Valida automáticamente el stock de 6 tipos de piezas (Cabeza, Torso, Brazo D, Brazo I, Pierna D, Pierna I).
      tags: [Producción]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelo_id, numero_serie]
              properties:
                modelo_id: { type: integer, example: 1 }
                numero_serie: { type: string, example: "MQ-2026-X01" }
      responses:
        '201': { description: Ensamblaje exitoso }
        '400': 
          description: Error lógico (Falta stock o serie duplicada)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /piezas/stock:
    get:
      summary: Listar piezas en stock
      description: Retorna las piezas que no han sido ensambladas (maniqui_id es null).
      tags: [Producción]
      responses:
        '200': { description: OK }

  /clientes:
    get:
      summary: Listar clientes
      tags: [Comercial]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cliente' }
    post:
      summary: Crear cliente
      tags: [Comercial]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClienteInput' }
      responses:
        '201': { description: Creado }

  /ventas:
    get:
      summary: Listar ventas
      tags: [Comercial]
      responses:
        '200': { description: OK }
    post:
      summary: Registrar venta atómica
      tags: [Comercial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cliente_id, maniquies]
              properties:
                cliente_id: { type: integer }
                metodo_pago: { type: string, enum: [Efectivo, Transferencia, Tarjeta, Mercado Pago, Otros] }
                moneda: { type: string, enum: [ARS, USD] }
                maniquies:
                  type: array
                  items:
                    type: object
                    required: [maniqui_id, precio_final]
                    properties:
                      maniqui_id: { type: integer }
                      precio_final: { type: number }
      responses:
        '201': { description: Venta registrada }

  /ventas/{id}:
    get:
      summary: Obtener detalle de venta
      tags: [Comercial]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '404': { description: No encontrada }

  /sistema/modelos:
    get:
      summary: Listar modelos técnicos
      tags: [Sistema]
      responses:
        '200': { description: OK }

  /sistema/modelos/{id}/descuento:
    get:
      summary: Calcular descuento UDF
      tags: [Sistema]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: porcentaje
          in: query
          required: true
          schema: { type: number }
      responses:
        '200': { description: OK }

  /sistema/health:
    get:
      summary: Estado del servidor
      tags: [Sistema]
      security: []
      responses:
        '200': { description: UP }

  /sistema/reportes/produccion:
    get:
      summary: Resumen estadístico de producción
      tags: [Sistema]
      responses:
        '200': { description: OK }

  /sistema/proveedores:
    get:
      summary: Listar proveedores
      tags: [Sistema]
      responses:
        '200': { description: OK }
    post:
      summary: Crear proveedor
      tags: [Sistema]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, codigo]
              properties:
                nombre: { type: string }
                codigo: { type: string }
      responses:
        '201': { description: Creado }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  schemas:
    Maniqui:
      type: object
      properties:
        id: { type: integer }
        numero_serie: { type: string }
        modelo_id: { type: integer }
        status: { type: string }

    Cliente:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        cuit_cuil: { type: string }
        email: { type: string }
        activo: { type: boolean }

    ClienteInput:
      type: object
      required: [nombre, cuit_cuil]
      properties:
        nombre: { type: string }
        cuit_cuil: { type: string, pattern: '^[0-9]{2}-[0-9]{8}-[0-9]{1}$' }
        email: { type: string, format: email }
