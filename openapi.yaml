openapi: 3.0.0
info:
  title: Tecda Maniquí API
  version: 1.5.0
servers:
  - url: http://localhost:8081

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: "admin_pablo" }
                password: { type: string, example: "tecda2026" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "mock-token" }
                  user: { type: object, properties: { id: { type: integer }, username: { type: string }, rol: { type: string } } }
        '401': { description: "Unauthorized" }

  /maniquies:
    get:
      summary: Listar
      tags: [Producción]
      responses:
        '200': { description: OK }
    post:
      summary: Crear
      tags: [Producción]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelo_id, numero_serie]
              properties:
                modelo_id: { type: integer, example: 1 }
                numero_serie: { type: string, example: "S-1" }
      responses:
        '201': { description: Created }
        '409': { $ref: '#/components/responses/409Conflict' }

  /maniquies/{numero_serie}:
    get:
      summary: Detalle
      tags: [Producción]
      parameters:
        - name: numero_serie
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  /piezas:
    post:
      summary: Registrar
      tags: [Inventario]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo_parte_id, modelo_id, origen_id, tono_acabado_id]
              properties:
                tipo_parte_id: { type: integer, example: 1 }
                modelo_id: { type: integer, example: 1 }
                origen_id: { type: integer, example: 1 }
                tono_acabado_id: { type: integer, example: 1 }
      responses:
        '201': { description: Created }

  /piezas/{serial_parte}/ensamblar:
    put:
      summary: Ensamblar
      tags: [Inventario]
      parameters:
        - name: serial_parte
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [maniqui_id]
              properties:
                maniqui_id: { type: integer, example: 1 }
      responses:
        '200': { description: OK }
        '409': { $ref: '#/components/responses/409Conflict' }

  /modelos:
    get:
      summary: Catálogo
      tags: [Catálogos]
      responses:
        '200': { description: OK }

  /modelos/{id}/descuento:
    get:
      summary: Descuento
      tags: [Analítica]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: porcentaje
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }

  /reportes/produccion:
    get:
      summary: Reporte
      tags: [Analítica]
      responses:
        '200': { description: OK }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    409Conflict:
      description: "Conflict"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
