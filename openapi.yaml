openapi: 3.0.0
info:
  title: Tecda Maniquí API
  version: 3.1.0
  description: |
    Gestión integral de fábrica de maniquíes con arquitectura SOLID (TypeScript).
    
    ### Cambios Recientes:
    * **Validación de Stock Técnica:** El ensamblaje ahora verifica la existencia de las 6 piezas (Cabeza, Torso, Brazos y Piernas).
    * **Captura de Errores SQL:** Errores del procedimiento almacenado se devuelven con descripción clara.
servers:
  - url: http://localhost:8081
    description: Servidor de Desarrollo

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email]
              properties:
                username: { type: string, minLength: 4 }
                password: { type: string, minLength: 6 }
                nombre_completo: { type: string }
                email: { type: string, format: email }
                rol: { type: string, enum: [vendedor, gerente_prod] }
      responses:
        '201':
          description: Usuario creado exitosamente
        '400':
          description: Error de validación o usuario duplicado

  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: JWT generado exitosamente
        '401':
          description: Credenciales inválidas

  /maniquies:
    get:
      summary: Listar maniquíes
      tags: [Producción]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: ['En Producción', 'Disponible', 'Vendido', 'Dañado'] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Maniqui' }

  /maniquies/{serie}:
    get:
      summary: Obtener maniquí por serie
      tags: [Producción]
      parameters:
        - name: serie
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }

  /maniquies/ensamblar:
    post:
      summary: Ejecutar ensamblaje técnico
      description: |
        Registra el ensamblaje de un nuevo maniquí. 
        Valida automáticamente el stock de 6 tipos de piezas (Cabeza, Torso, Brazo D, Brazo I, Pierna D, Pierna I).
      tags: [Producción]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelo_id, numero_serie]
              properties:
                modelo_id: { type: integer, example: 1 }
                numero_serie: { type: string, example: "MQ-2026-X01" }
      responses:
        '201': { description: Ensamblaje exitoso }
        '400': 
          description: Error lógico (Falta stock o serie duplicada)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /piezas/stock:
    get:
      summary: Listar piezas en stock
      description: Retorna las piezas que no han sido ensambladas (maniqui_id es null).
      tags: [Producción]
      responses:
        '200': { description: OK }

  /piezas/ingreso:
    post:
      summary: Registrar ingreso de piezas en lote
      description: Registra el ingreso de un lote de piezas del mismo tipo, origen y modelo. Requiere rol Gerente.
      tags: [Producción]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [origen_codigo, tipo_parte_codigo, modelo_id, cantidad, costo]
              properties:
                origen_codigo: { type: string, example: "ARG" }
                tipo_parte_codigo: { type: string, example: "CAB" }
                modelo_id: { type: integer, example: 1 }
                cantidad: { type: integer, minimum: 1, example: 5 }
                costo: { type: number, minimum: 0.01, example: 120.50 }
      responses:
        '201':
          description: Piezas ingresadas con éxito

  /clientes:
    get:
      summary: Listar clientes
      tags: [Comercial]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cliente' }
    post:
      summary: Crear cliente
      tags: [Comercial]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClienteInput' }
      responses:
        '201': { description: Creado }

  /ventas:
    get:
      summary: Listar ventas
      tags: [Comercial]
      responses:
        '200': { description: OK }
    post:
      summary: Registrar venta atómica
      tags: [Comercial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cliente_id, maniquies]
              properties:
                cliente_id: { type: integer }
                metodo_pago: { type: string, enum: [Efectivo, Transferencia, Tarjeta, Mercado Pago, Otros] }
                moneda: { type: string, enum: [ARS, USD] }
                maniquies:
                  type: array
                  items:
                    type: object
                    required: [maniqui_id, precio_final]
                    properties:
                      maniqui_id: { type: integer }
                      precio_final: { type: number }
      responses:
        '201': { description: Venta registrada }

  /ventas/{id}:
    get:
      summary: Obtener detalle de venta
      tags: [Comercial]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '404': { description: No encontrada }

  /sistema/modelos:
    get:
      summary: Listar modelos técnicos
      tags: [Sistema]
      responses:
        '200': { description: OK }
    post:
      summary: Crear nuevo modelo técnico
      description: Da de alta un modelo técnico con sus partes especificadas. Requiere rol Gerente.
      tags: [Sistema]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, partes, sexo_id, costo_unitario, precio_venta]
              properties:
                nombre: { type: string, minLength: 3, example: "Maniquí Costura Premium" }
                partes:
                  type: array
                  items: { type: string }
                  example: ["Cabeza", "Torso", "Brazos", "Piernas"]
                sexo_id: { type: integer, example: 1 }
                costo_unitario: { type: number, minimum: 0.01, example: 1500.00 }
                precio_venta: { type: number, minimum: 0.01, example: 3500.00 }
      responses:
        '201':
          description: Modelo creado exitosamente

  /sistema/modelos/{id}/descuento:
    get:
      summary: Calcular descuento UDF
      tags: [Sistema]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: porcentaje
          in: query
          required: true
          schema: { type: number }
      responses:
        '200': { description: OK }

  /sistema/health:
    get:
      summary: Estado del servidor
      tags: [Sistema]
      security: []
      responses:
        '200': { description: UP }

  /sistema/reportes/produccion:
    get:
      summary: Resumen estadístico de producción
      tags: [Sistema]
      responses:
        '200': { description: OK }

  /reportes/rentabilidad:
    get:
      summary: Obtener reporte de rentabilidad
      description: Retorna un listado consolidado de costos y precios con la rentabilidad asociada. Requiere rol Gerente.
      tags: [Sistema]
      responses:
        '200':
          description: OK

  /reportes/stock-critico:
    get:
      summary: Obtener reporte de stock crítico
      description: Retorna los tipos de parte que se encuentran por debajo del nivel de stock requerido. Requiere rol Gerente.
      tags: [Sistema]
      responses:
        '200':
          description: OK

  /sistema/proveedores:
    get:
      summary: Listar proveedores
      tags: [Sistema]
      responses:
        '200': { description: OK }
    post:
      summary: Crear proveedor
      tags: [Sistema]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, codigo]
              properties:
                nombre: { type: string }
                codigo: { type: string }
      responses:
        '201': { description: Creado }

  /notificaciones/stream:
    get:
      summary: Suscribirse al stream SSE de notificaciones
      description: Canal de comunicación Server-Sent Events (SSE) para alertas en tiempo real.
      tags: [Notificaciones]
      responses:
        '200':
          description: Conexión SSE establecida con éxito.

  /notificaciones/ordenes:
    post:
      summary: Registrar una nueva orden de compra interna
      description: Genera una orden de compra y la emite a todos los clientes SSE conectados.
      tags: [Notificaciones]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelo, parte]
              properties:
                modelo: { type: string, example: "Maniquí de Costura" }
                parte: { type: string, example: "Cabeza" }
      responses:
        '201':
          description: Orden de compra creada con éxito.


components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  schemas:
    Maniqui:
      type: object
      properties:
        id: { type: integer }
        numero_serie: { type: string }
        modelo_id: { type: integer }
        status: { type: string }

    Cliente:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        cuit_cuil: { type: string }
        email: { type: string }
        activo: { type: boolean }

    ClienteInput:
      type: object
      required: [nombre, cuit_cuil]
      properties:
        nombre: { type: string }
        cuit_cuil: { type: string, pattern: '^[0-9]{2}-[0-9]{8}-[0-9]{1}$' }
        email: { type: string, format: email }
